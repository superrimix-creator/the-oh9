<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The OH9</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>

<body>

<header>
  <div class="logo">THE OH9</div>
  <nav>
    <a href="#about">About</a>
    <a href="#career">Career</a>
    <a href="#gallery">Gallery</a>
  </nav>
</header>

<section class="hero">
  <img src="main.png" class="hero-img">
  <div class="overlay">
    <!-- <h1>OH HYEON GYU</h1>/
    <p>STRIKER · No.9</p> -->
  </div>
</section>

<section id="about">
  <h2>About</h2>
  <p>
    The OH9은 축구 선수 오현규를 중심으로 한 브랜드이자 매니지먼트입니다.
  </p>
</section>

<section id="career">
  <h2>Career</h2>

  <div class="career-wrapper">

    <!-- 왼쪽: 타임라인 -->
    <div class="timeline">
      <div class="timeline-item">
        <div class="timeline-date">2019~2022</div>
        <div class="timeline-content">수원 삼성 블루윙즈</div>
      </div>

      <div class="timeline-item">
        <div class="timeline-date">2020~2021</div>
        <div class="timeline-content">상주-김천 상무 FC (군 복무)</div>
      </div>

      <div class="timeline-item">
        <div class="timeline-date">2023~2024</div>
        <div class="timeline-content">셀틱 FC</div>
      </div>

      <div class="timeline-item">
        <div class="timeline-date">2024~2026</div>
        <div class="timeline-content">KRC 헹크</div>
      </div>

      <div class="timeline-item">
        <div class="timeline-date">2026~</div>
        <div class="timeline-content">베식타스 JK</div>
      </div>
    </div>

    <!-- 오른쪽: 국가대표 -->
    <div class="national">
      <h3>National Team 🇰🇷 </h3>
      <p>대한민국 축구 국가대표 (2022~)</p>
    </div>

  </div>
</section>
<section id="gallery">
  <h2>Gallery</h2>
  <div class="grid">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
  </div>
</section>
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>


<footer>
  <p>© THE OH9</p>
</footer>


<script src="script.js"></script>
</body>
</html>
